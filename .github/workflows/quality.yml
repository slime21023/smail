name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  library:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run docs:check
      - run: bun run test
      - run: bun run build
  browser-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: SMAIL_E2E_CHANNEL=chrome bun run e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-artifacts
          path: e2e-artifacts
